name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://erpdog:erpdog@localhost:5432/erpdog?schema=public
      JWT_SECRET: ci-secret-with-at-least-24-chars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: corepack pnpm db:generate

      - name: Validate Prisma schema
        run: corepack pnpm exec prisma validate --schema prisma/schema.prisma

      - name: Typecheck
        run: corepack pnpm -r typecheck

      - name: Build
        run: corepack pnpm -r build
