name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erpdog
          POSTGRES_PASSWORD: erpdog
          POSTGRES_DB: erpdog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erpdog -d erpdog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://erpdog:erpdog@localhost:5432/erpdog?schema=public
      JWT_SECRET: ci-secret-with-at-least-24-chars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: corepack pnpm db:generate

      - name: Validate Prisma schema
        run: corepack pnpm exec prisma validate --schema prisma/schema.prisma

      - name: Typecheck
        run: corepack pnpm -r typecheck

      - name: Build
        run: corepack pnpm -r build

      - name: Apply database migrations
        run: corepack pnpm exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Run business e2e
        run: |
          set +e
          set -o pipefail
          corepack pnpm test:e2e 2>&1 | tee /tmp/business-e2e.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo "## Business e2e failure"
              echo ""
              echo '```text'
              tail -200 /tmp/business-e2e.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Business e2e failed::$(tail -40 /tmp/business-e2e.log | tr '\n' ' ' | sed 's/%/%25/g; s/\\r/%0D/g; s/\\n/%0A/g')"
            exit "$status"
          fi
