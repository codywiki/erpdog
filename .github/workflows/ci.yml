name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erpdog
          POSTGRES_PASSWORD: erpdog
          POSTGRES_DB: erpdog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erpdog -d erpdog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://erpdog:erpdog@localhost:5432/erpdog?schema=public
      JWT_SECRET: ci-secret-with-at-least-24-chars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: corepack pnpm db:generate

      - name: Validate Prisma schema
        run: corepack pnpm exec prisma validate --schema prisma/schema.prisma

      - name: Typecheck
        run: corepack pnpm -r typecheck

      - name: Build
        run: corepack pnpm -r build

      - name: Apply database migrations
        run: corepack pnpm exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Run business e2e
        run: corepack pnpm test:e2e
