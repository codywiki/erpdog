name: Pages Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-preview
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish static preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: corepack pnpm --filter @erpdog/contracts build

      - name: Build static web
        env:
          NEXT_OUTPUT: export
          NEXT_BASE_PATH: /erpdog
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || '' }}
        run: corepack pnpm --filter @erpdog/web build

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf /tmp/erpdog-pages
          mkdir -p /tmp/erpdog-pages
          cp -R apps/web/out/. /tmp/erpdog-pages/
          touch /tmp/erpdog-pages/.nojekyll
          git -C /tmp/erpdog-pages init -q
          git -C /tmp/erpdog-pages checkout -b gh-pages -q
          git -C /tmp/erpdog-pages config user.name "github-actions[bot]"
          git -C /tmp/erpdog-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C /tmp/erpdog-pages add -A
          git -C /tmp/erpdog-pages commit -m "deploy pages preview from ${GITHUB_SHA}" -q
          git -C /tmp/erpdog-pages remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C /tmp/erpdog-pages push --force origin gh-pages
