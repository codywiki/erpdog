services:
  postgres:
    image: postgres:16-alpine
    container_name: erpdog-postgres
    environment:
      POSTGRES_USER: erpdog
      POSTGRES_PASSWORD: erpdog
      POSTGRES_DB: erpdog
    ports:
      - "5432:5432"
    volumes:
      - erpdog-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpdog -d erpdog"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erpdog-redis
    ports:
      - "6379:6379"
    volumes:
      - erpdog-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: erpdog-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: erpdog
      MINIO_ROOT_PASSWORD: erpdog-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - erpdog-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  erpdog-postgres-data:
  erpdog-redis-data:
  erpdog-minio-data:
